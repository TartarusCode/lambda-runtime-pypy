service: hello-pypy311


provider:
  name: aws
  region: eu-central-1

functions:
  hello-pypy311:
    handler: hello.handler
    runtime: provided.al2023
    # Set PYPY_LAYER_ARN before deploy, for example:
    # PYPY_LAYER_ARN=$(aws lambda list-layer-versions --layer-name pypy311 --query "LayerVersions[0].LayerVersionArn" --output text --region eu-central-1)
    layers:
      - ${env:PYPY_LAYER_ARN}

